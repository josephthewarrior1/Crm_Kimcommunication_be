server.port=8080

spring.datasource.url=${JDBC_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pms_dev}}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:pmspostgres2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# Use Liquibase for schema management
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# CORS
app.cors.allowed-origins=http://localhost:3000, http://127.0.0.1:3000

# File storage defaults
storage.type=local
storage.local-dir=uploads
