server.port=8080

# PostgreSQL (prod) — override everything with real env values in deployment
spring.datasource.url=${JDBC_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pms_prod}}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:emspostgres2025}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase on in prod
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# CORS (tighten for production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# File storage
storage.type=${STORAGE_TYPE:local}
storage.local-dir=${STORAGE_LOCAL_DIR:uploads}
storage.s3.endpoint=${STORAGE_S3_ENDPOINT:http://localhost:9000}
storage.s3.accessKey=${STORAGE_S3_ACCESS:minioadmin}
storage.s3.secretKey=${STORAGE_S3_SECRET:minioadmin}
storage.s3.bucket=${STORAGE_S3_BUCKET:pms-docs}
spring.profiles.active=prod

# Ensure Liquibase/DB/etc are configured here for prod as needed

# Disable data seeders except admin bootstrap
app.data.seed=false

# Admin bootstrap for production (override via env var APP_ADMIN_PASSWORD in deployment)
app.admin.username=admin
app.admin.email=admin@example.com
app.admin.password=ProdSecure!123
