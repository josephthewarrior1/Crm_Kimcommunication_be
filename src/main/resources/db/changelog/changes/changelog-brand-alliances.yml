databaseChangeLog:

  # ── project_brand_alliances table ───────────────────────────────────
  - changeSet:
      id: create-project-brand-alliances
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: project_brand_alliances
      changes:
        - createTable:
            tableName: project_brand_alliances
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: project_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: client_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: funding_amount, type: "DECIMAL(19,2)", constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: project_brand_alliances
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_brand_alliances_project
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: project_brand_alliances
            baseColumnNames: client_id
            referencedTableName: clients
            referencedColumnNames: id
            constraintName: fk_brand_alliances_client
