databaseChangeLog:
  - changeSet:
      id: migrate-client-contact-birthday-to-birthdate-date
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: HALT
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: client_contacts
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE public.client_contacts
                ADD COLUMN IF NOT EXISTS birthdate DATE;

              ALTER TABLE public.client_contacts
                ADD COLUMN IF NOT EXISTS birthdate_legacy_text VARCHAR(100);

              UPDATE public.client_contacts
              SET birthdate_legacy_text = birthday
              WHERE birthday IS NOT NULL
                AND btrim(birthday) <> ''
                AND birthdate_legacy_text IS NULL
                AND birthday !~ '^\d{4}-\d{2}-\d{2}$'
                AND birthday !~ '^\d{1,2} [A-Za-z]+ \d{4}$';

              UPDATE public.client_contacts
              SET birthdate = CASE
                WHEN birthday IS NULL OR btrim(birthday) = '' THEN birthdate
                WHEN birthday ~ '^\d{4}-\d{2}-\d{2}$' THEN birthday::date
                WHEN birthday ~ '^\d{1,2} [A-Za-z]+ \d{4}$' THEN TO_DATE(birthday, 'DD Month YYYY')
                ELSE birthdate
              END
              WHERE birthdate IS NULL;

              ALTER TABLE public.client_contacts
                DROP COLUMN IF EXISTS birthday;
