databaseChangeLog:
  - changeSet:
      id: add-client-contact-profile-fields
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: client_contacts
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS phone_code VARCHAR(20);
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS birthday VARCHAR(100);
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS religion VARCHAR(100);
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS hobbies VARCHAR(500);
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS family_members TEXT;
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS home_address TEXT;
              ALTER TABLE public.client_contacts ADD COLUMN IF NOT EXISTS notes TEXT;
