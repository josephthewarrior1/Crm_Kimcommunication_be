databaseChangeLog:

  # Add country_id column to clients
  - changeSet:
      id: clients-add-country-id
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: clients
                columnName: country_id
      changes:
        - addColumn:
            tableName: clients
            columns:
              - column:
                  name: country_id
                  type: BIGINT

  # Migrate existing country varchar data to country_id references
  - changeSet:
      id: clients-migrate-country-data
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: country
          - columnExists:
              tableName: clients
              columnName: country_id
      changes:
        - sql:
            sql: >
              INSERT INTO countries (name, created_at, updated_at)
              SELECT DISTINCT c.country, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
              FROM clients c
              WHERE c.country IS NOT NULL
                AND c.country != ''
                AND NOT EXISTS (SELECT 1 FROM countries co WHERE co.name = c.country);
        - sql:
            sql: >
              UPDATE clients
              SET country_id = (SELECT co.id FROM countries co WHERE co.name = clients.country)
              WHERE country IS NOT NULL AND country != '';

  # Drop old country varchar column
  - changeSet:
      id: clients-drop-country-varchar
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: country
          - columnExists:
              tableName: clients
              columnName: country_id
      changes:
        - dropColumn:
            tableName: clients
            columnName: country

  # Add FK constraint
  - changeSet:
      id: clients-add-country-fk
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: country_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: clients
            baseColumnNames: country_id
            referencedTableName: countries
            referencedColumnNames: id
            constraintName: fk_clients_country
