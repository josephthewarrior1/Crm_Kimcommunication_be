databaseChangeLog:
  - changeSet:
      id: create-client-folder-shares
      author: system
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: client_folder_shares
      changes:
        - createTable:
            tableName: client_folder_shares
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: folder_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: permission, type: VARCHAR(20), defaultValue: 'VIEW_ONLY', constraints: { nullable: false } }
              - column: { name: shared_by, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: client_folder_shares
            baseColumnNames: folder_id
            referencedTableName: document_folders
            referencedColumnNames: id
            constraintName: fk_cfs_folder
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: client_folder_shares
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cfs_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: client_folder_shares
            baseColumnNames: shared_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cfs_shared_by
            onDelete: SET NULL
        - addUniqueConstraint:
            tableName: client_folder_shares
            columnNames: folder_id, user_id
            constraintName: uk_cfs_folder_user
        - createIndex:
            indexName: idx_cfs_user
            tableName: client_folder_shares
            columns:
              - column: { name: user_id }
        - createIndex:
            indexName: idx_cfs_folder
            tableName: client_folder_shares
            columns:
              - column: { name: folder_id }

  - changeSet:
      id: add-client-id-to-users
      author: system
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: users
            columnName: client_id
      changes:
        - addColumn:
            tableName: users
            columns:
              - column: { name: client_id, type: BIGINT }
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: client_id
            referencedTableName: clients
            referencedColumnNames: id
            constraintName: fk_users_client
            onDelete: SET NULL

  - changeSet:
      id: add-user-id-to-client-contacts
      author: system
      preConditions:
        onFail: MARK_RAN
        not:
          columnExists:
            tableName: client_contacts
            columnName: user_id
      changes:
        - addColumn:
            tableName: client_contacts
            columns:
              - column: { name: user_id, type: BIGINT }
        - addForeignKeyConstraint:
            baseTableName: client_contacts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_client_contacts_user
            onDelete: SET NULL
