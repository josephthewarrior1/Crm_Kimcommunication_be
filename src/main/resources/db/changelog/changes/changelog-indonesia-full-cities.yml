databaseChangeLog:

  - changeSet:
      id: seed-full-indonesia-cities
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: provinces
          - tableExists:
              tableName: cities
          - sqlCheck:
              expectedResult: 1
              sql: SELECT COUNT(*) FROM countries WHERE code = 'ID'
      changes:
        - sqlFile:
            path: db/changelog/changes/seed-indonesia-full-cities.sql
            relativeToChangelogFile: false
            splitStatements: true
