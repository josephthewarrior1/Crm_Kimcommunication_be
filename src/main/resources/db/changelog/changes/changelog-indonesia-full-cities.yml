databaseChangeLog:

  - changeSet:
      id: seed-full-indonesia-cities
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: provinces
          - tableExists:
              tableName: cities
          - sqlCheck:
              expectedResult: 1
              sql: SELECT COUNT(*) FROM countries WHERE code = 'ID'
          - sqlCheck:
              expectedResult: 0
              sql: |
                SELECT COUNT(*)
                FROM provinces p
                JOIN countries c ON c.id = p.country_id
                WHERE c.code = 'ID'
          - sqlCheck:
              expectedResult: 0
              sql: |
                SELECT COUNT(*)
                FROM cities ci
                JOIN countries c ON c.id = ci.country_id
                WHERE c.code = 'ID'
      changes:
        - sqlFile:
            path: db/changelog/changes/seed-indonesia-full-cities.sql
            relativeToChangelogFile: false
            splitStatements: true
