databaseChangeLog:
  - changeSet:
      id: project-finance-columns-fix-qtn-no
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: qtn_no
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: qtn_no
                  type: varchar(100)

  - changeSet:
      id: project-finance-columns-fix-po-no
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: po_no
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: po_no
                  type: varchar(100)

  - changeSet:
      id: project-finance-columns-fix-invoice-no
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: invoice_no
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column:
                  name: invoice_no
                  type: varchar(100)
