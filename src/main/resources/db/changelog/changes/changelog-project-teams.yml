databaseChangeLog:

  # ── project_teams table ───────────────────────────────────────────
  - changeSet:
      id: create-project-teams
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: project_teams
      changes:
        - createTable:
            tableName: project_teams
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: project_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: name, type: "VARCHAR(100)", constraints: { nullable: false } }
              - column: { name: sort_order, type: INTEGER, defaultValueNumeric: 0 }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: project_teams
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_project_teams_project
            onDelete: CASCADE

  # ── add team_id to project_members ────────────────────────────────
  - changeSet:
      id: add-team-id-to-project-members
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: project_members
                columnName: team_id
      changes:
        - addColumn:
            tableName: project_members
            columns:
              - column:
                  name: team_id
                  type: BIGINT
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: project_members
            baseColumnNames: team_id
            referencedTableName: project_teams
            referencedColumnNames: id
            constraintName: fk_project_members_team
            onDelete: "SET NULL"
