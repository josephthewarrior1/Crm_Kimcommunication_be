              ) AS seed(province_name, province_code)
              ON CONFLICT (name, country_id) DO UPDATE
              SET code = EXCLUDED.code,
                  updated_at = CURRENT_TIMESTAMP;

              WITH indonesia AS (
                SELECT id FROM countries WHERE code = 'ID' LIMIT 1
              ),
              province_lookup AS (
                SELECT p.id, p.name, p.country_id
                FROM provinces p
                JOIN indonesia i ON i.id = p.country_id
              ),
              city_seed AS (
