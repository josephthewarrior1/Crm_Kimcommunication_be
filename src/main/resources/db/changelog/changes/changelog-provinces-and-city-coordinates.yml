                province_lookup.country_id,
                province_lookup.id,
                city_seed.lat,
                city_seed.lng,
                CURRENT_TIMESTAMP,
                CURRENT_TIMESTAMP
              FROM city_seed
              JOIN province_lookup ON province_lookup.name = city_seed.province_name
              ON CONFLICT (name, country_id) DO UPDATE
              SET province_id = EXCLUDED.province_id,
                  latitude = EXCLUDED.latitude,
                  longitude = EXCLUDED.longitude,
                  updated_at = CURRENT_TIMESTAMP;
