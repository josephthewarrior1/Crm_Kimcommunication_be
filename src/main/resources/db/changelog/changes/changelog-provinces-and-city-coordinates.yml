databaseChangeLog:

  - changeSet:
      id: create-provinces-table
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: provinces
      changes:
        - createTable:
            tableName: provinces
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: code, type: VARCHAR(20) }
              - column: { name: country_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: provinces
            baseColumnNames: country_id
            referencedTableName: countries
            referencedColumnNames: id
            constraintName: fk_provinces_country
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: provinces
            columnNames: name, country_id
            constraintName: uq_provinces_name_country

  - changeSet:
      id: ensure-provinces-columns-and-constraints
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: provinces
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE public.provinces ADD COLUMN IF NOT EXISTS code VARCHAR(20);
              ALTER TABLE public.provinces ADD COLUMN IF NOT EXISTS country_id BIGINT;
              ALTER TABLE public.provinces ADD COLUMN IF NOT EXISTS created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP;
              ALTER TABLE public.provinces ADD COLUMN IF NOT EXISTS updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP;

              DO $$
              BEGIN
                IF NOT EXISTS (
                  SELECT 1
                  FROM pg_constraint
                  WHERE conrelid = 'public.provinces'::regclass
                    AND contype = 'f'
                    AND pg_get_constraintdef(oid) LIKE 'FOREIGN KEY (country_id)%REFERENCES countries(id)%'
                ) THEN
                  ALTER TABLE public.provinces
                  ADD CONSTRAINT fk_provinces_country
                  FOREIGN KEY (country_id)
                  REFERENCES public.countries(id)
                  ON DELETE CASCADE;
                END IF;

                IF NOT EXISTS (
                  SELECT 1
                  FROM pg_constraint
                  WHERE conrelid = 'public.provinces'::regclass
                    AND contype = 'u'
                    AND pg_get_constraintdef(oid) = 'UNIQUE (name, country_id)'
                ) THEN
                  ALTER TABLE public.provinces
                  ADD CONSTRAINT uq_provinces_name_country
                  UNIQUE (name, country_id);
                END IF;
              END
              $$;

  - changeSet:
      id: add-province-and-coordinates-to-cities
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - tableExists:
              tableName: cities
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE public.cities ADD COLUMN IF NOT EXISTS province_id BIGINT;
              ALTER TABLE public.cities ADD COLUMN IF NOT EXISTS latitude DECIMAL(10,6);
              ALTER TABLE public.cities ADD COLUMN IF NOT EXISTS longitude DECIMAL(10,6);

              DO $$
              BEGIN
                IF NOT EXISTS (
                  SELECT 1
                  FROM pg_constraint
                  WHERE conrelid = 'public.cities'::regclass
                    AND contype = 'f'
                    AND pg_get_constraintdef(oid) LIKE 'FOREIGN KEY (province_id)%REFERENCES provinces(id)%'
                ) THEN
                  ALTER TABLE public.cities
                  ADD CONSTRAINT fk_cities_province
                  FOREIGN KEY (province_id)
                  REFERENCES public.provinces(id)
                  ON DELETE SET NULL;
                END IF;
              END
              $$;

  - changeSet:
      id: seed-indonesia-provinces-and-cities
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - sqlCheck:
              expectedResult: 1
              sql: SELECT COUNT(*) FROM countries WHERE code = 'ID'
          - sqlCheck:
              expectedResult: 0
              sql: |
                SELECT COUNT(*)
                FROM provinces p
                JOIN countries c ON c.id = p.country_id
                WHERE c.code = 'ID'
          - sqlCheck:
              expectedResult: 0
              sql: |
                SELECT COUNT(*)
                FROM cities ci
                JOIN countries c ON c.id = ci.country_id
                WHERE c.code = 'ID'
      changes:
        - sql:
            splitStatements: false
            sql: |
              WITH indonesia AS (
                SELECT id FROM countries WHERE code = 'ID' LIMIT 1
              )
              INSERT INTO provinces (name, code, country_id, created_at, updated_at)
