                    ('Pekanbaru', 'Riau', 0.507068, 101.447779),
                    ('Jambi', 'Jambi', -1.610123, 103.613120),
                    ('Palembang', 'Sumatera Selatan', -2.976074, 104.775431),
                    ('Bengkulu', 'Bengkulu', -3.792845, 102.260764),
                    ('Bandar Lampung', 'Lampung', -5.397140, 105.266788),
                    ('Pangkalpinang', 'Kepulauan Bangka Belitung', -2.131627, 106.116930),
                    ('Tanjung Pinang', 'Kepulauan Riau', 0.918550, 104.466507),
                    ('Jakarta', 'DKI Jakarta', -6.208763, 106.845599),
                    ('Bandung', 'Jawa Barat', -6.917464, 107.619123),
                    ('Semarang', 'Jawa Tengah', -6.966667, 110.416664),
