                    ('Kupang', 'Nusa Tenggara Timur', -10.177200, 123.607032),
                    ('Pontianak', 'Kalimantan Barat', -0.026330, 109.342503),
                    ('Palangka Raya', 'Kalimantan Tengah', -2.208333, 113.916667),
                    ('Banjarbaru', 'Kalimantan Selatan', -3.442500, 114.840556),
                    ('Samarinda', 'Kalimantan Timur', -0.502183, 117.153709),
                    ('Tanjung Selor', 'Kalimantan Utara', 2.837500, 117.365278),
                    ('Manado', 'Sulawesi Utara', 1.474830, 124.842079),
                    ('Palu', 'Sulawesi Tengah', -0.891700, 119.870700),
                    ('Makassar', 'Sulawesi Selatan', -5.147665, 119.432732),
                    ('Kendari', 'Sulawesi Tenggara', -3.998459, 122.512974),
                    ('Gorontalo', 'Gorontalo', 0.543544, 123.056770),
                    ('Mamuju', 'Sulawesi Barat', -2.681413, 118.886704),
                    ('Ambon', 'Maluku', -3.654703, 128.190643),
                    ('Sofifi', 'Maluku Utara', 0.736944, 127.576111),
                    ('Jayapura', 'Papua', -2.533710, 140.718132),
