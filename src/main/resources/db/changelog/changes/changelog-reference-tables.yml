databaseChangeLog:

  # ── countries table ─────────────────────────────────────────────────
  - changeSet:
      id: ref-create-countries
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: countries
      changes:
        - createTable:
            tableName: countries
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: code, type: VARCHAR(10) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }

  # ── cities table ────────────────────────────────────────────────────
  - changeSet:
      id: ref-create-cities
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: cities
      changes:
        - createTable:
            tableName: cities
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: country_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: cities
            baseColumnNames: country_id
            referencedTableName: countries
            referencedColumnNames: id
            constraintName: fk_cities_country
        - addUniqueConstraint:
            tableName: cities
            columnNames: name, country_id
            constraintName: uq_cities_name_country

  # ── industries table ────────────────────────────────────────────────
  - changeSet:
      id: ref-create-industries
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: industries
      changes:
        - createTable:
            tableName: industries
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }

  # ── venues: add new specification columns ───────────────────────────
  - changeSet:
      id: ref-add-venue-spec-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: venues
                columnName: ballroom_name
      changes:
        - addColumn:
            tableName: venues
            columns:
              - column: { name: ballroom_name, type: VARCHAR(255) }
              - column: { name: ballroom_floor, type: VARCHAR(100) }
              - column: { name: ballroom_length, type: "DECIMAL(10,2)" }
              - column: { name: ballroom_width, type: "DECIMAL(10,2)" }
              - column: { name: ballroom_height, type: "DECIMAL(10,2)" }
              - column: { name: foyer_length, type: "DECIMAL(10,2)" }
              - column: { name: foyer_width, type: "DECIMAL(10,2)" }
              - column: { name: foyer_height, type: "DECIMAL(10,2)" }
              - column: { name: screen_length, type: "DECIMAL(10,2)" }
              - column: { name: screen_width, type: "DECIMAL(10,2)" }
              - column: { name: existing_screen, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: ibm_table_length, type: "DECIMAL(10,2)" }
              - column: { name: ibm_table_width, type: "DECIMAL(10,2)" }
              - column: { name: ibm_table_height, type: "DECIMAL(10,2)" }
              - column: { name: round_table_diameter, type: "DECIMAL(10,2)" }
              - column: { name: round_table_height, type: "DECIMAL(10,2)" }
              - column: { name: electricity_watt, type: INTEGER }
              - column: { name: sound_system_watt, type: INTEGER }
              - column: { name: microphone_provided, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: microphone_model, type: VARCHAR(255) }
              - column: { name: microphone_quantity, type: INTEGER }
              - column: { name: total_stage_modules, type: INTEGER }
              - column: { name: generator_allowed, type: BOOLEAN, defaultValueBoolean: false }

  # ── venues: migrate city VARCHAR → city_id FK ──────────────────────
  - changeSet:
      id: ref-venues-add-city-id
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: venues
                columnName: city_id
      changes:
        - addColumn:
            tableName: venues
            columns:
              - column: { name: city_id, type: BIGINT }

  - changeSet:
      id: ref-venues-migrate-city-data
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: venues
              columnName: city
          - columnExists:
              tableName: venues
              columnName: city_id
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO cities (name)
              SELECT DISTINCT city FROM venues
              WHERE city IS NOT NULL AND city <> ''
                AND NOT EXISTS (SELECT 1 FROM cities c WHERE c.name = venues.city AND c.country_id IS NULL);

              UPDATE venues v
              SET city_id = c.id
              FROM cities c
              WHERE v.city = c.name AND c.country_id IS NULL AND v.city_id IS NULL;

  - changeSet:
      id: ref-venues-drop-city-varchar
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: venues
              columnName: city
          - columnExists:
              tableName: venues
              columnName: city_id
      changes:
        - dropColumn:
            tableName: venues
            columnName: city

  - changeSet:
      id: ref-venues-add-city-fk
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: venues
              columnName: city_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: venues
            baseColumnNames: city_id
            referencedTableName: cities
            referencedColumnNames: id
            constraintName: fk_venues_city

  # ── clients: migrate industry VARCHAR → industry_id FK ─────────────
  - changeSet:
      id: ref-clients-add-industry-id
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: clients
                columnName: industry_id
      changes:
        - addColumn:
            tableName: clients
            columns:
              - column: { name: industry_id, type: BIGINT }

  - changeSet:
      id: ref-clients-migrate-industry-data
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: industry
          - columnExists:
              tableName: clients
              columnName: industry_id
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO industries (name)
              SELECT DISTINCT industry FROM clients
              WHERE industry IS NOT NULL AND industry <> ''
              ON CONFLICT (name) DO NOTHING;

              UPDATE clients cl
              SET industry_id = i.id
              FROM industries i
              WHERE cl.industry = i.name AND cl.industry_id IS NULL;

  - changeSet:
      id: ref-clients-drop-industry-varchar
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: industry
          - columnExists:
              tableName: clients
              columnName: industry_id
      changes:
        - dropColumn:
            tableName: clients
            columnName: industry

  - changeSet:
      id: ref-clients-add-industry-fk
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: clients
              columnName: industry_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: clients
            baseColumnNames: industry_id
            referencedTableName: industries
            referencedColumnNames: id
            constraintName: fk_clients_industry

  # ── venue_attachments table ─────────────────────────────────────────
  - changeSet:
      id: ref-create-venue-attachments
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: venue_attachments
      changes:
        - createTable:
            tableName: venue_attachments
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: venue_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: label, type: VARCHAR(255) }
              - column: { name: description, type: VARCHAR(1000) }
              - column: { name: file_name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: file_url, type: VARCHAR(500), constraints: { nullable: false } }
              - column: { name: file_type, type: VARCHAR(100) }
              - column: { name: file_size, type: BIGINT }
              - column: { name: category, type: VARCHAR(50) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: venue_attachments
            baseColumnNames: venue_id
            referencedTableName: venues
            referencedColumnNames: id
            constraintName: fk_venue_attachments_venue
            onDelete: CASCADE
