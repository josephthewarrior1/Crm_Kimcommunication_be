databaseChangeLog:
  - changeSet:
      id: add-room-id-to-venue-attachments
      author: openai
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - tableExists:
              tableName: venue_attachments
          - tableExists:
              tableName: venue_rooms
          - not:
              columnExists:
                tableName: venue_attachments
                columnName: room_id
      changes:
        - addColumn:
            tableName: venue_attachments
            columns:
              - column:
                  name: room_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: venue_attachments
            baseColumnNames: room_id
            referencedTableName: venue_rooms
            referencedColumnNames: id
            constraintName: fk_venue_attachments_room
            onDelete: CASCADE
