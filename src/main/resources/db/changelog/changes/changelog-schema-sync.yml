databaseChangeLog:

  # ── projects: rename priority → size ──────────────────────────────────
  - changeSet:
      id: sync-rename-priority-to-size
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: projects
              columnName: priority
      changes:
        - renameColumn:
            tableName: projects
            oldColumnName: priority
            newColumnName: size
            columnDataType: VARCHAR(50)
        - sql:
            sql: |
              UPDATE projects SET size = 'LARGE' WHERE size = 'HIGH';
              UPDATE projects SET size = 'SMALL' WHERE size = 'LOW';

  # ── projects: add role columns ────────────────────────────────────────
  - changeSet:
      id: sync-add-project-role-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: account_manager
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column: { name: account_manager, type: VARCHAR(255) }
              - column: { name: project_organizer, type: VARCHAR(255) }
              - column: { name: finance, type: VARCHAR(255) }
              - column: { name: admin, type: VARCHAR(255) }

  # ── users: create employment_status enum ──────────────────────────────
  - changeSet:
      id: sync-create-employment-status-enum
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - sqlCheck:
              expectedResult: 0
              sql: SELECT COUNT(*) FROM pg_type WHERE typname = 'employment_status'
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE TYPE employment_status AS ENUM ('INTERNAL', 'FREELANCE', 'CLIENT');

  # ── users: add profile columns ────────────────────────────────────────
  - changeSet:
      id: sync-add-user-profile-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: users
                columnName: employment_type
      changes:
        - sql:
            splitStatements: false
            sql: |
              ALTER TABLE users ADD COLUMN employment_type employment_status DEFAULT 'INTERNAL';
              UPDATE users SET employment_type = 'INTERNAL' WHERE employment_type IS NULL;
        - addColumn:
            tableName: users
            columns:
              - column: { name: phone, type: VARCHAR(20) }
              - column: { name: location, type: VARCHAR(100) }
              - column: { name: avatar, type: VARCHAR(255) }

  # ── project_roles table ───────────────────────────────────────────────
  - changeSet:
      id: sync-create-project-roles
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: project_roles
      changes:
        - createTable:
            tableName: project_roles
            columns:
              - column: { name: id, type: SERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(50), constraints: { nullable: false, unique: true } }
              - column: { name: description, type: VARCHAR(255) }
              - column: { name: can_create, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: can_read, type: BOOLEAN, defaultValueBoolean: true }
              - column: { name: can_update, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: can_delete, type: BOOLEAN, defaultValueBoolean: false }

  # ── project_roles: seed data ──────────────────────────────────────────
  - changeSet:
      id: sync-seed-project-roles
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - sqlCheck:
              expectedResult: 0
              sql: SELECT COUNT(*) FROM project_roles
      changes:
        - sql:
            sql: |
              INSERT INTO project_roles (name, can_create, can_read, can_update, can_delete) VALUES
              ('PROJECT_ADMIN', TRUE, TRUE, TRUE, TRUE),
              ('EDITOR', TRUE, TRUE, TRUE, FALSE),
              ('CONTRIBUTOR', TRUE, TRUE, FALSE, FALSE),
              ('VIEWER', FALSE, TRUE, FALSE, FALSE);

  # ── project_members table ─────────────────────────────────────────────
  - changeSet:
      id: sync-create-project-members
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: project_members
      changes:
        - createTable:
            tableName: project_members
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: project_id, type: BIGINT }
              - column: { name: user_id, type: BIGINT }
              - column: { name: project_job_title, type: VARCHAR(100) }
              - column: { name: project_role_id, type: INTEGER }
              - column: { name: joined_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: manager_id, type: BIGINT }
        - addForeignKeyConstraint:
            baseTableName: project_members
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: project_members_project_id_fkey
        - addForeignKeyConstraint:
            baseTableName: project_members
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: project_members_user_id_fkey
        - addForeignKeyConstraint:
            baseTableName: project_members
            baseColumnNames: project_role_id
            referencedTableName: project_roles
            referencedColumnNames: id
            constraintName: project_members_project_role_id_fkey
        - addForeignKeyConstraint:
            baseTableName: project_members
            baseColumnNames: manager_id
            referencedTableName: project_members
            referencedColumnNames: id
            constraintName: fk_project_members_manager

  # ── document_templates table ──────────────────────────────────────────
  - changeSet:
      id: sync-create-document-templates
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: document_templates
      changes:
        - createTable:
            tableName: document_templates
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: type, type: VARCHAR(50) }
              - column: { name: url, type: VARCHAR(500) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: description, type: VARCHAR(2000) }
              - column: { name: is_active, type: BOOLEAN, defaultValueBoolean: true }

  # ── document_templates: seed data ─────────────────────────────────────
  - changeSet:
      id: sync-seed-document-templates
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - sqlCheck:
              expectedResult: 0
              sql: SELECT COUNT(*) FROM document_templates
      changes:
        - sql:
            sql: |
              INSERT INTO document_templates (name, type, description, url) VALUES
              ('Template MOM', 'template', 'For Client Brief, Client updates', '/files/templates/template_mom.docx'),
              ('Template Agenda', 'template', 'Agenda rundown', '/files/templates/template_agenda.xlsx'),
              ('Template Brief & Registration', 'template', 'brief and registration', '/files/templates/template_brief_and_registration.pdf'),
              ('Template Contact List Client, Vendor & Team', 'template', 'Contact list', '/files/templates/template_contact_list_client_vendor_team.xlsx'),
              ('Template Cue Card MC', 'template', 'Cue Card MC', '/files/templates/template_cue_card_mc.docx'),
              ('Template Cue Card MC Foyer Area', 'template', 'Cue Card MC foyer area', '/files/templates/template_cue_card_mc_foyer_area.docx'),
              ('Template Cue Card MC Media Briefing', 'template', 'Cue Card MC media briefing', '/files/templates/template_cue_card_mc_media_briefing.docx'),
              ('Template Manual Book Event', 'template', 'Manual Book Event', '/files/templates/template_manual_book.pdf'),
              ('Template Storyboard Event', 'template', 'Storyboard', '/files/templates/template_storyboard_event.pdf'),
              ('Template Team Structure', 'template', 'team structure', '/files/templates/template_struktur_team_event.xlsx'),
              ('Template Tracker Request', 'template', 'tracker request', '/files/templates/tracker_request.xlsx');

  # ── projects: drop legacy role columns ───────────────────────────────
  - changeSet:
      id: sync-drop-project-role-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: projects
              columnName: master_pic
      changes:
        - dropColumn: { tableName: projects, columnName: master_pic }
        - dropColumn: { tableName: projects, columnName: account_manager }
        - dropColumn: { tableName: projects, columnName: project_organizer }
        - dropColumn: { tableName: projects, columnName: finance }
        - dropColumn: { tableName: projects, columnName: admin }

  # ── venues table ─────────────────────────────────────────────────────
  - changeSet:
      id: sync-create-venues
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: venues
      changes:
        - createTable:
            tableName: venues
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: city, type: VARCHAR(255) }
              - column: { name: document_data, type: VARCHAR(2000) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }

  # ── projects: add venue_id FK ────────────────────────────────────────
  - changeSet:
      id: sync-add-project-venue-fk
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: venue_id
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column: { name: venue_id, type: BIGINT }
        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: venue_id
            referencedTableName: venues
            referencedColumnNames: id
            constraintName: fk_projects_venue

  # ── projects: add hedging column ─────────────────────────────────────
  - changeSet:
      id: sync-add-project-hedging
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: hedging
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column: { name: hedging, type: "DECIMAL(19,2)" }

  # ── projects: replace size enum with target integer ────────────────
  - changeSet:
      id: sync-add-project-target
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: projects
                columnName: target
      changes:
        - addColumn:
            tableName: projects
            columns:
              - column: { name: target, type: INTEGER }
        - sql:
            sql: |
              UPDATE projects SET target = CASE
                WHEN size = 'LARGE' THEN 500
                WHEN size = 'MEDIUM' THEN 100
                WHEN size = 'SMALL' THEN 30
                ELSE NULL
              END
              WHERE size IS NOT NULL AND target IS NULL;

  - changeSet:
      id: sync-drop-project-size-column
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - columnExists:
              tableName: projects
              columnName: size
      changes:
        - dropColumn: { tableName: projects, columnName: size }

  # ── workflow_stages: add approval columns ──────────────────────────
  - changeSet:
      id: sync-add-stage-approval-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: workflow_stages
                columnName: approved_by_id
      changes:
        - addColumn:
            tableName: workflow_stages
            columns:
              - column: { name: approved_by_id, type: BIGINT }
              - column: { name: approved_at, type: TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: workflow_stages
            baseColumnNames: approved_by_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_workflow_stages_approved_by
