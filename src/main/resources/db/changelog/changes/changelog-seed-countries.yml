databaseChangeLog:

  # Seed countries table with common countries if empty
  - changeSet:
      id: seed-countries-if-empty
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - sqlCheck:
              expectedResult: 0
              sql: SELECT COUNT(*) FROM countries
      changes:
        - sql:
            splitStatements: false
            sql: |
              INSERT INTO countries (name, code, created_at, updated_at) VALUES
              ('Indonesia', 'ID', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('United States', 'US', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('United Kingdom', 'GB', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Singapore', 'SG', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Malaysia', 'MY', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Australia', 'AU', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Japan', 'JP', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('South Korea', 'KR', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('China', 'CN', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('India', 'IN', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Germany', 'DE', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('France', 'FR', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Netherlands', 'NL', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Canada', 'CA', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Thailand', 'TH', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Philippines', 'PH', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Vietnam', 'VN', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('United Arab Emirates', 'AE', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Saudi Arabia', 'SA', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP),
              ('Brazil', 'BR', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
              ON CONFLICT (name) DO NOTHING;
