databaseChangeLog:

  - changeSet:
      id: add-team-id-to-workflow-stages
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          columnExists:
            tableName: workflow_stages
            columnName: team_id
      changes:
        - addColumn:
            tableName: workflow_stages
            columns:
              - column:
                  name: team_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: workflow_stages
            baseColumnNames: team_id
            referencedTableName: project_teams
            referencedColumnNames: id
            constraintName: fk_workflow_stages_team
            onDelete: SET NULL
