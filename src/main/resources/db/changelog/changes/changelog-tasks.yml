databaseChangeLog:

  - changeSet:
      id: create-tasks-table
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          tableExists:
            tableName: tasks
      changes:
        - createTable:
            tableName: tasks
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: pic
                  type: VARCHAR(255)
              - column:
                  name: order_sequence
                  type: INTEGER
              - column:
                  name: approved_by_id
                  type: BIGINT
              - column:
                  name: approved_at
                  type: TIMESTAMP
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: team_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: approved_by_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_tasks_approved_by
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_tasks_project
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: tasks
            baseColumnNames: team_id
            referencedTableName: project_teams
            referencedColumnNames: id
            constraintName: fk_tasks_team
            onDelete: SET NULL
        - createIndex:
            indexName: idx_tasks_project_id
            tableName: tasks
            columns:
              - column:
                  name: project_id

  - changeSet:
      id: create-task-checklist-items-table
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          tableExists:
            tableName: task_checklist_items
      changes:
        - createTable:
            tableName: task_checklist_items
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: completed
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: order_position
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: task_checklist_items
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task_checklist_task
            onDelete: CASCADE
        - createIndex:
            indexName: idx_task_checklist_task_id
            tableName: task_checklist_items
            columns:
              - column:
                  name: task_id

  - changeSet:
      id: create-task-documents-table
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          tableExists:
            tableName: task_documents
      changes:
        - createTable:
            tableName: task_documents
            columns:
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: document_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: task_documents
            columnNames: task_id, document_id
            constraintName: pk_task_documents
        - addForeignKeyConstraint:
            baseTableName: task_documents
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task_documents_task
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: task_documents
            baseColumnNames: document_id
            referencedTableName: project_documents
            referencedColumnNames: id
            constraintName: fk_task_documents_document
            onDelete: CASCADE

  - changeSet:
      id: create-task-assignees-table
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        not:
          tableExists:
            tableName: task_assignees
      changes:
        - createTable:
            tableName: task_assignees
            columns:
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: pic_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task_assignees
            baseColumnNames: task_id
            referencedTableName: tasks
            referencedColumnNames: id
            constraintName: fk_task_assignees_task
            onDelete: CASCADE
        - createIndex:
            indexName: idx_task_assignees_task_id
            tableName: task_assignees
            columns:
              - column:
                  name: task_id

  - changeSet:
      id: drop-tasks-pic-and-order-columns
      author: system
      changes:
        - dropColumn:
            tableName: tasks
            columnName: pic
        - dropColumn:
            tableName: tasks
            columnName: order_sequence
