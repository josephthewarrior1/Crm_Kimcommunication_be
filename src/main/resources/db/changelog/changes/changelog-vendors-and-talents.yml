databaseChangeLog:

  - changeSet:
      id: create-vendors-table
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: vendors
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: owner, type: VARCHAR(255) }
              - column: { name: pic_name, type: VARCHAR(255) }
              - column: { name: pic_phone, type: VARCHAR(100) }
              - column: { name: pic_email, type: VARCHAR(255) }
              - column: { name: category_types_json, type: TEXT }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }

  - changeSet:
      id: create-talents-table
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              tableExists:
                tableName: talents
      changes:
        - createTable:
            tableName: talents
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: vendor_id, type: BIGINT }
              - column: { name: categories_json, type: TEXT }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: description, type: VARCHAR(1000) }
              - column: { name: id_number, type: VARCHAR(255) }
              - column: { name: phone_code, type: VARCHAR(50) }
              - column: { name: phone, type: VARCHAR(100) }
              - column: { name: email, type: VARCHAR(255) }
              - column: { name: social_media_link, type: VARCHAR(500) }
              - column: { name: city_id, type: BIGINT }
              - column: { name: sex, type: VARCHAR(50) }
              - column: { name: height_cm, type: INTEGER }
              - column: { name: photo_file_name, type: VARCHAR(255) }
              - column: { name: photo_url, type: VARCHAR(500) }
              - column: { name: languages_json, type: TEXT }
              - column: { name: rate, type: "DECIMAL(12,2)" }
              - column: { name: halfday_rate, type: "DECIMAL(12,2)" }
              - column: { name: fullday_rate, type: "DECIMAL(12,2)" }
              - column: { name: bank_name, type: VARCHAR(255) }
              - column: { name: account_number, type: VARCHAR(255) }
              - column: { name: pic, type: VARCHAR(255) }
              - column: { name: info_source, type: VARCHAR(500) }
              - column: { name: gadget_proficient, type: BOOLEAN, defaultValueBoolean: false }
              - column: { name: cv_file_name, type: VARCHAR(255) }
              - column: { name: cv_url, type: VARCHAR(500) }
              - column: { name: remarks, type: VARCHAR(2000) }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: CURRENT_TIMESTAMP }
        - addForeignKeyConstraint:
            baseTableName: talents
            baseColumnNames: vendor_id
            referencedTableName: vendors
            referencedColumnNames: id
            constraintName: fk_talents_vendor
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: talents
            baseColumnNames: city_id
            referencedTableName: cities
            referencedColumnNames: id
            constraintName: fk_talents_city
            onDelete: SET NULL
