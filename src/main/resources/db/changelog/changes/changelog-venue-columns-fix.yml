      id: venue-columns-fix-document-data
      author: codex
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: venues
                columnName: document_data
      changes:
        - addColumn:
            tableName: venues
            columns:
              - column: { name: document_data, type: VARCHAR(2000) }

