databaseChangeLog:

  - changeSet:
      id: venue-add-measurement-unit-columns
      author: system
      preConditions:
        onFail: MARK_RAN
        onError: MARK_RAN
        and:
          - dbms:
              type: postgresql
          - not:
              columnExists:
                tableName: venues
                columnName: ballroom_unit
      changes:
        - addColumn:
            tableName: venues
            columns:
              - column:
                  name: ballroom_unit
                  type: VARCHAR(5)
                  defaultValue: m
              - column:
                  name: foyer_unit
                  type: VARCHAR(5)
                  defaultValue: m
              - column:
                  name: screen_unit
                  type: VARCHAR(5)
                  defaultValue: m
              - column:
                  name: table_unit
                  type: VARCHAR(5)
                  defaultValue: cm
