        - addForeignKeyConstraint:
            baseTableName: workflow_stage_deliverables
            baseColumnNames: stage_id
            referencedTableName: workflow_stages
            referencedColumnNames: id
            constraintName: fk_stage_deliverables

        - createTable:
            tableName: workflow_stage_dependencies
            columns:
              - column: { name: stage_id, type: BIGINT }
              - column: { name: dependency, type: TEXT }
        - addForeignKeyConstraint:
            baseTableName: workflow_stage_dependencies
            baseColumnNames: stage_id
            referencedTableName: workflow_stages
            referencedColumnNames: id
            constraintName: fk_stage_dependencies

        - createTable:
            tableName: project_events
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: VARCHAR(255) }
              - column: { name: date, type: DATE }
              - column: { name: type, type: VARCHAR(50) }
              - column: { name: status, type: VARCHAR(50) }
              - column: { name: project_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
        - addForeignKeyConstraint:
            baseTableName: project_events
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_event_project
        - createIndex:
            tableName: project_events
            indexName: idx_events_project
            columns:
              - column: { name: project_id }
        - createIndex:
            tableName: project_events
            indexName: idx_events_date
            columns:
              - column: { name: date }

        - createTable:
            tableName: project_documents
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255) }
