databaseChangeLog:
  - changeSet:
      id: 0001-create-core-tables
      author: codex
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: username, type: VARCHAR(150), constraints: { nullable: false, unique: true } }
              - column: { name: email, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: password_hash, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: dob, type: DATE }
              - column: { name: active, type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: approved, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
        - createTable:
            tableName: user_roles
            columns:
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: role, type: VARCHAR(50), constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: user_roles
            columnNames: user_id, role
            constraintName: pk_user_roles
        - addForeignKeyConstraint:
            baseTableName: user_roles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_roles_user
        - createIndex:
            tableName: user_roles
            indexName: idx_user_roles_role
            columns:
              - column: { name: role }

        - createTable:
            tableName: sessions
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: token, type: VARCHAR(64), constraints: { nullable: false } }
              - column: { name: user_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: created_at, type: TIMESTAMP }
              - column: { name: expires_at, type: TIMESTAMP }
              - column: { name: revoked, type: BOOLEAN, defaultValueBoolean: false }
        - addUniqueConstraint:
            tableName: sessions
            columnNames: token
            constraintName: uq_sessions_token
        - addForeignKeyConstraint:
            baseTableName: sessions
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_sessions_user
        - createIndex:
            tableName: sessions
            indexName: idx_sessions_user
            columns:
              - column: { name: user_id }

        # Optional domain: clients table (normalize project.client)
        - createTable:
            tableName: clients
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false, unique: true } }
              - column: { name: industry, type: VARCHAR(100) }
              - column: { name: country, type: VARCHAR(100) }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }

        - createTable:
            tableName: team_members
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255) }
              - column: { name: role, type: VARCHAR(255) }
              - column: { name: email, type: VARCHAR(255) }
              - column: { name: phone, type: VARCHAR(255) }
              - column: { name: location, type: VARCHAR(255) }
              - column: { name: avatar, type: VARCHAR(255) }
              - column: { name: status, type: VARCHAR(50) }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
        - createIndex:
            tableName: team_members
            indexName: idx_team_members_status
            columns:
              - column: { name: status }

        - createTable:
            tableName: projects
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255), constraints: { nullable: false } }
              - column: { name: description, type: TEXT }
              - column: { name: status, type: VARCHAR(50) }
              - column: { name: priority, type: VARCHAR(50) }
              - column: { name: progress, type: INTEGER }
              - column: { name: start_date, type: DATE }
              - column: { name: end_date, type: DATE }
              - column: { name: budget, type: "NUMERIC(19,2)" }
              - column: { name: client, type: VARCHAR(255) }
              - column: { name: client_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
        - addForeignKeyConstraint:
            baseTableName: projects
            baseColumnNames: client_id
            referencedTableName: clients
            referencedColumnNames: id
            constraintName: fk_project_client
        - createIndex:
            tableName: projects
            indexName: idx_projects_status
            columns:
              - column: { name: status }
        - createIndex:
            tableName: projects
            indexName: idx_projects_priority
            columns:
              - column: { name: priority }

        - createTable:
            tableName: project_team_members
            columns:
              - column: { name: project_id, type: BIGINT, constraints: { nullable: false } }
              - column: { name: member_id, type: BIGINT, constraints: { nullable: false } }
        - addPrimaryKey:
            tableName: project_team_members
            columnNames: project_id, member_id
            constraintName: pk_project_team_members
        - addForeignKeyConstraint:
            baseTableName: project_team_members
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_ptm_project
        - addForeignKeyConstraint:
            baseTableName: project_team_members
            baseColumnNames: member_id
            referencedTableName: team_members
            referencedColumnNames: id
            constraintName: fk_ptm_member
        - createIndex:
            tableName: project_team_members
            indexName: idx_ptm_project
            columns:
              - column: { name: project_id }
        - createIndex:
            tableName: project_team_members
            indexName: idx_ptm_member
            columns:
              - column: { name: member_id }

        - createTable:
            tableName: workflow_stages
            columns:
              - column: { name: id, type: BIGSERIAL, constraints: { primaryKey: true, nullable: false } }
              - column: { name: name, type: VARCHAR(255) }
              - column: { name: description, type: TEXT }
              - column: { name: status, type: VARCHAR(50) }
              - column: { name: due_date, type: DATE }
              - column: { name: assignee, type: VARCHAR(255) }
              - column: { name: project_id, type: BIGINT }
              - column: { name: created_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
              - column: { name: updated_at, type: TIMESTAMPTZ, defaultValueComputed: NOW() }
        - addForeignKeyConstraint:
            baseTableName: workflow_stages
            baseColumnNames: project_id
            referencedTableName: projects
            referencedColumnNames: id
